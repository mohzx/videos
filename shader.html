<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
}
#app{
  width:100%;
  height:100%;
}
</style>
</head>

<body>
<div id="app"></div>

<script type="module">
import { ShaderGradientCanvas, ShaderGradient }
from "https://unpkg.com/@shadergradient/react/build/index.module.js";

const container = document.getElementById("app");

const canvas = new ShaderGradientCanvas(container);

new ShaderGradient(canvas,{
  animate:"on",
  brightness:1.2,
  color1:"#ff5005",
  color2:"#dbba95",
  color3:"#d0bce1",
  rotationY:10,
  rotationZ:50,
  uAmplitude:1,
  uDensity:1.3,
  uFrequency:5.5,
  uSpeed:0.4,
  uStrength:4
});
</script>

</body>
</html>
