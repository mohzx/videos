<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
}
#shader-gradient{
  width:100%;
  height:100%;
}
</style>
</head>

<body>

<div id="shader-gradient"></div>

<script src="https://cdn.jsdelivr.net/npm/shadergradient/dist/shadergradient.umd.js"></script>

<script>
const gradient = new ShaderGradient({
  container: "#shader-gradient",
  animate: "on",
  brightness: 1.2,
  color1: "#ff5005",
  color2: "#dbba95",
  color3: "#d0bce1",
  reflection: 0.1,
  rotationX: 0,
  rotationY: 10,
  rotationZ: 50,
  type: "plane",
  uAmplitude: 1,
  uDensity: 1.3,
  uFrequency: 5.5,
  uSpeed: 0.4,
  uStrength: 4
});
</script>

</body>
</html>
